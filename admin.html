<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台 | 个人作品集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(-45deg,#f0f9ff,#e0f2fe,#faf5ff,#d1fae5);
  background-size:400% 400%;animation:bgGradient 20s ease infinite;color:#111;
  padding:40px 20px;max-width:900px;margin:0 auto;min-height:100vh
}
@keyframes bgGradient{0%{background-position:0%50%}50%{background-position:100%50%}100%{background-position:0%50%}}

.login-box{
  background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
  border-radius:24px;padding:50px;max-width:420px;margin:80px auto;
  box-shadow:0 15px 35px rgba(0,0,0,.08);text-align:center;
  animation:fadeInUp .7s ease-out
}
.login-box h2{margin-bottom:28px;font-size:24px}
input{width:100%;padding:18px;border:1px solid #e6e8eb;
  border-radius:18px;margin-bottom:20px;font-size:15px;outline:0;
  transition:all .3s
}
input:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.1)}

.btn{padding:18px 24px;border:none;border-radius:18px;
  font-size:15px;font-weight:600;cursor:pointer;
  transition:all .3s cubic-bezier(.25,1,.5,1)
}
.btn-primary{
  background:linear-gradient(135deg,#3b82f6,#10b981);color:#fff;
  width:100%;box-shadow:0 8px 20px rgba(59,130,246,.2)
}
.btn-primary:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(59,130,246,.25)}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-danger:hover{background:#e0352b;transform:scale(.96)}

.admin-panel{display:none;animation:fadeInUp .7s ease-out}
.panel-section{
  background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
  border-radius:24px;padding:36px;margin-bottom:28px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);transition:all .3s
}
.panel-section:hover{transform:translateY(-3px);box-shadow:0 15px 35px rgba(0,0,0,.09)}
.panel-section h3{font-size:20px;margin-bottom:24px}
.form-row{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.form-row input,.form-row select{flex:1;min-width:180px;padding:16px;border:1px solid #e6e8eb;border-radius:16px;transition:all .2s}

.item{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px;background:#f7f8fa;border-radius:16px;margin-bottom:10px;
  transition:all .2s
}
.item:hover{background:#eff3ff}

.back-link{text-align:center;margin-top:40px}
.back-link a{color:#3b82f6;text-decoration:none;font-weight:500;transition:all .2s}
.back-link a:hover{transform:scale(1.05);display:inline-block}

@keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* 上传按钮样式 */
.upload-btn-wrapper {
  position: relative;
  overflow: hidden;
  display: inline-block;
  margin-bottom: 10px;
}
.upload-btn {
  border: 2px solid #3b82f6;
  color: #3b82f6;
  background-color: white;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.upload-btn:hover {
  background: #3b82f6;
  color: white;
}
.upload-btn-wrapper input[type=file] {
  font-size: 100px;
  position: absolute;
  left: 0;
  top: 0;
  opacity: 0;
  cursor: pointer;
}
.preview-img {
  max-width: 150px;
  max-height: 150px;
  border-radius: 16px;
  margin-top: 10px;
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
}
.tip-text {
  font-size: 12px;
  color: #666;
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="login-box" id="loginBox">
  <h2>管理员登录</h2>
  <input type="password" id="adminPwd" placeholder="输入管理员密码">
  <button class="btn btn-primary" onclick="login()">登录</button>
</div>

<div class="admin-panel" id="adminPanel">
  <h2 style="text-align:center;margin-bottom:40px;">作品集管理后台</h2>

  <!-- 1. 个人照片区（修复逻辑：本地预览+直链输入） -->
  <div class="panel-section">
    <h3>个人照片</h3>
    <div class="form-row" style="align-items: flex-start;">
      <div style="flex:1;">
        <div class="upload-btn-wrapper">
          <button class="upload-btn">选择本地照片（仅预览）</button>
          <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(this)">
        </div>
        <p class="tip-text">⚠️ 仅本地预览，需填下方直链才能生效</p>
        <input type="text" id="photoUrlInput" placeholder="粘贴照片直链（如sm.ms图床链接）" style="margin-top:10px;">
      </div>
      <div style="text-align:center;">
        <img id="photoPreview" class="preview-img" src="https://picsum.photos/400/400">
      </div>
    </div>
    <button class="btn btn-primary" onclick="updatePhoto()">更新照片</button>
  </div>

  <!-- 2. 简历附件区 -->
  <div class="panel-section">
    <h3>简历附件</h3>
    <div class="form-row">
      <input type="text" id="resumeUrlInput" placeholder="粘贴简历PDF直链（如奶牛快传/阿里云盘链接）">
      <button class="btn btn-primary" onclick="updateResume()">更新简历</button>
    </div>
    <p class="tip-text">⚠️ 需先将PDF上传到文件托管服务，获取直链</p>
  </div>

  <!-- 3. 视频分类区 -->
  <div class="panel-section">
    <h3>视频分类</h3>
    <div class="form-row">
      <input id="newCatName" placeholder="输入分类名称（如：产品视频/Vlog/日常）">
      <button class="btn btn-primary" onclick="addCategory()">添加分类</button>
    </div>
    <div id="categoryList"></div>
  </div>

  <!-- 4. 视频作品区（修复分类绑定逻辑） -->
  <div class="panel-section">
    <h3>视频作品</h3>
    <div class="form-row">
      <select id="videoCatSelect" style="flex:0.8;">
        <option value="">请先选择分类</option>
      </select>
      <input type="text" id="videoUrlInput" placeholder="粘贴视频直链（如B站/阿里云盘链接）" style="flex:1.5;">
      <input type="text" id="videoTitleInput" placeholder="输入视频标题" style="flex:1;">
      <button class="btn btn-primary" onclick="addVideo()">添加视频</button>
    </div>
    <p class="tip-text">⚠️ 需先添加分类，再选择分类添加视频</p>
    <div id="videoList"></div>
  </div>

  <div class="back-link">
    <a href="index.html">返回作品集主页</a>
  </div>
</div>

<script>
// 🔐 后台密码（给别人做网站就改这里！）
const ADMIN_PASSWORD = '1999414'; 

// 本地存储数据（所有修改都存在浏览器本地，不影响GitHub）
let portfolioData = JSON.parse(localStorage.getItem('portfolioData')) || {
  avatarUrl: "https://picsum.photos/400/400",
  resumeUrl: "",
  categories: []
};

// 登录逻辑
function login(){
  const p = document.getElementById('adminPwd').value;
  if(p === ADMIN_PASSWORD){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    initAdmin();
  } else {
    alert('密码错误');
  }
}

// 初始化后台
function initAdmin(){
  document.getElementById('photoPreview').src = portfolioData.avatarUrl;
  document.getElementById('photoUrlInput').value = portfolioData.avatarUrl;
  document.getElementById('resumeUrlInput').value = portfolioData.resumeUrl;
  renderCatSelect();
  renderCategoryList();
  renderVideoList();
}

// ================= 照片功能（修复后） =================
// 本地预览照片（不上传到服务器，仅本地看）
function previewPhoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('photoPreview').src = e.target.result;
    }
    reader.readAsDataURL(input.files[0]);
    alert("✅ 本地照片预览成功！\n请粘贴照片直链到输入框，再点「更新照片」生效");
  }
}

// 更新照片（用直链）
function updatePhoto(){
  const url = document.getElementById('photoUrlInput').value.trim();
  if(!url) {
    alert("❌ 请先粘贴照片直链！");
    return;
  }
  portfolioData.avatarUrl = url;
  saveData();
  alert("✅ 照片更新成功！刷新主页即可看到");
  window.location.reload();
}

// ================= 简历功能 =================
function updateResume(){
  const url = document.getElementById('resumeUrlInput').value.trim();
  portfolioData.resumeUrl = url;
  saveData();
  alert("✅ 简历更新成功！点击主页按钮可测试");
}

// ================= 分类功能（修复后） =================
// 渲染分类下拉框
function renderCatSelect(){
  const select = document.getElementById('videoCatSelect');
  select.innerHTML = '<option value="">请先选择分类</option>';
  portfolioData.categories.forEach((cat, index) => {
    const option = document.createElement('option');
    option.value = index;
    option.textContent = cat.name;
    select.appendChild(option);
  });
}

// 添加分类
function addCategory(){
  const name = document.getElementById('newCatName').value.trim();
  if(!name) {
    alert("❌ 请输入分类名称！");
    return;
  }
  // 检查分类是否重复
  const isExist = portfolioData.categories.some(cat => cat.name === name);
  if(isExist) {
    alert("❌ 该分类已存在！");
    return;
  }
  portfolioData.categories.push({ name: name, videos: [] });
  saveData();
  renderCatSelect();
  renderCategoryList();
  document.getElementById('newCatName').value = '';
  alert("✅ 分类添加成功！");
}

// 删除分类
function deleteCategory(index){
  if(confirm(`⚠️ 确定要删除该分类？分类下的视频会一起删除！`)){
    portfolioData.categories.splice(index, 1);
    saveData();
    renderCatSelect();
    renderCategoryList();
    renderVideoList();
    alert("✅ 分类删除成功！");
  }
}

// 渲染分类列表
function renderCategoryList(){
  const list = document.getElementById('categoryList');
  list.innerHTML = '';
  portfolioData.categories.forEach((cat, index) => {
    const item = document.createElement('div');
    item.className = 'item';
    item.innerHTML = `
      <div>${cat.name}（${cat.videos.length}个视频）</div>
      <button class="btn btn-danger" onclick="deleteCategory(${index})">删除</button>
    `;
    list.appendChild(item);
  });
}

// ================= 视频功能（修复分类绑定逻辑） =================
// 添加视频
function addVideo(){
  const catIndex = document.getElementById('videoCatSelect').value;
  const url = document.getElementById('videoUrlInput').value.trim();
  const title = document.getElementById('videoTitleInput').value.trim();

  // 校验
  if(!catIndex) {
    alert("❌ 请先选择分类！");
    return;
  }
  if(!url) {
    alert("❌ 请粘贴视频直链！");
    return;
  }
  if(!title) {
    alert("❌ 请输入视频标题！");
    return;
  }

  // 把视频加到对应分类
  portfolioData.categories[catIndex].videos.push({ url: url, title: title });
  saveData();
  renderVideoList();
  // 清空输入框
  document.getElementById('videoUrlInput').value = '';
  document.getElementById('videoTitleInput').value = '';
  alert("✅ 视频添加成功！刷新主页即可看到");
}

// 删除视频
function deleteVideo(catIndex, videoIndex){
  if(confirm(`⚠️ 确定要删除该视频？`)){
    portfolioData.categories[catIndex].videos.splice(videoIndex, 1);
    saveData();
    renderVideoList();
    alert("✅ 视频删除成功！");
  }
}

// 渲染视频列表
function renderVideoList(){
  const list = document.getElementById('videoList');
  list.innerHTML = '';
  portfolioData.categories.forEach((cat, catIndex) => {
    cat.videos.forEach((video, videoIndex) => {
      const item = document.createElement('div');
      item.className = 'item';
      item.innerHTML = `
        <div>【${cat.name}】${video.title}</div>
        <button class="btn btn-danger" onclick="deleteVideo(${catIndex}, ${videoIndex})">删除</button>
      `;
      list.appendChild(item);
    });
  });
}

// ================= 通用保存逻辑 =================
function saveData(){
  localStorage.setItem('portfolioData', JSON.stringify(portfolioData));
  // 通知主页更新
  window.dispatchEvent(new StorageEvent('storage', {
    key: 'portfolioData',
    newValue: JSON.stringify(portfolioData)
  }));
}

// 回车登录
document.getElementById('adminPwd').addEventListener('keypress', e => {
  if(e.key === 'Enter') login();
});
</script>

</body>
</html>
